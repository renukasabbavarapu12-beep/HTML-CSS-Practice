<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML CSS Practice</title>

  <style>

    /* Q1 */
    .q1 p {
      color: blue;
      background-color: lightgrey;
    }

    /* Q2 */
    #title {
      color: green;
    }
    .box {
      width: 200px;
      height: 100px;
      background-color: lightblue;
    }

    /* Q3 */
    .box3 {
      padding: 20px;
      border: 2px solid black;
      margin: 20px;
    }

    /* Q4 */
    .box4 {
      width: 200px;
      padding: 20px;
      border: 5px solid black;
      box-sizing: border-box;
    }

    /* Q5 */
    .q5 h1 {
      text-transform: uppercase;
      text-align: center;
    }

    /* Q6 */
    .q6 p {
      font-family: Arial;
      font-size: 18px;
      color: blue;
    }

    /* Q7 */
    .q7 a {
      text-decoration: none;
    }
    .q7 a:hover {
      text-decoration: underline;
    }

    /* Q8 */
    .q8 p {
      color: rgb(255,0,0);
    }

    /* Q9 */
    .q9 p {
      color: #0000FF;
    }

    /* Q10 */
    .bg {
      height: 300px;
      background-image: url("https://picsum.photos/600/300");
      background-size: cover;
      background-position: center;
    }

    /* Q11 */
    .inline span {
      background-color: lightblue;
    }

    /* Q12 */
    .block div {
      width: 200px;
      height: 50px;
      margin: 5px;
    }

    /* Q13 */
    .inlineblock div {
      display: inline-block;
      width: 150px;
      height: 100px;
      margin: 10px;
      background: orange;
    }

    /* Q14 */
    .hide1 {
      display: none;
    }
    .hide2 {
      visibility: hidden;
    }

    /* Q15 */
    .rgba {
      width: 200px;
      height: 200px;
      background: rgba(255,0,0,0.5);
    }

    /* Q16 */
    .opacity div {
      width: 100px;
      height: 100px;
      margin: 5px;
      display: inline-block;
      opacity: 0.5;
    }

    /* Q17 */
    .parent {
      width: 400px;
      background: lightgrey;
    }
    .child {
      width: 50%;
      background: blue;
      height: 50px;
    }

    /* Q18 */
    .em {
      font-size: 20px;
      padding: 2em;
      background: lightgreen;
    }

    /* Q19 */
    html {
      font-size: 16px;
    }
    .rem {
      font-size: 2rem;
    }

    /* Q20 */
    .bg2 {
      height: 300px;
      background: url("https://picsum.photos/500/300") no-repeat center;
      background-size: cover;
    }

  </style>
</head>

<body>

<h1>HTML CSS Practice (Q1–Q20)</h1>

<hr>

<!-- Q1 -->
<div class="q1">
<h2>Q1</h2>
<p>Paragraph 1</p>
<p>Paragraph 2</p>
</div>

<hr>

<!-- Q2 -->
<h2 id="title">Q2</h2>
<div class="box"></div>

<hr>

<!-- Q3 -->
<h2>Q3</h2>
<div class="box3">Box model</div>

<hr>

<!-- Q4 -->
<h2>Q4</h2>
<div class="box4">Box sizing</div>

<hr>

<!-- Q5 -->
<div class="q5">
<h2>Q5</h2>
<h1>This is heading</h1>
</div>

<hr>

<!-- Q6 -->
<div class="q6">
<h2>Q6</h2>
<p>Font styling</p>
</div>

<hr>

<!-- Q7 -->
<div class="q7">
<h2>Q7</h2>
<a href="#">Hover link</a>
</div>

<hr>

<!-- Q8 -->
<div class="q8">
<h2>Q8</h2>
<p>RGB color</p>
</div>

<hr>

<!-- Q9 -->
<div class="q9">
<h2>Q9</h2>
<p>HEX color</p>
</div>

<hr>

<!-- Q10 -->
<h2>Q10</h2>
<div class="bg"></div>

<hr>

<!-- Q11 -->
<div class="inline">
<h2>Q11</h2>
<span>Box1</span>
<span>Box2</span>
</div>

<hr>

<!-- Q12 -->
<div class="block">
<h2>Q12</h2>
<div style="background:red;"></div>
<div style="background:blue;"></div>
</div>

<hr>

<!-- Q13 -->
<div class="inlineblock">
<h2>Q13</h2>
<div></div>
<div></div>
<div></div>
</div>

<hr>

<!-- Q14 -->
<h2>Q14</h2>
<p class="hide1">Hidden</p>
<p class="hide2">Invisible</p>

<hr>

<!-- Q15 -->
<h2>Q15</h2>
<div class="rgba"></div>

<hr>

<!-- Q16 -->
<div class="opacity">
<h2>Q16</h2>
<div style="background:red;"></div>
<div style="background:blue;"></div>
<div style="background:green;"></div>
</div>

<hr>

<!-- Q17 -->
<h2>Q17</h2>
<div class="parent">
  <div class="child"></div>
</div>

<hr>

<!-- Q18 -->
<h2>Q18</h2>
<div class="em">EM Example</div>

<hr>

<!-- Q19 -->
<h2>Q19</h2>
<p class="rem">REM Example</p>

<hr>

<!-- Q20 -->
<h2>Q20</h2>
<div class="bg2"></div>

</body>
</html>
